<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Axolotl Automator (MVP)</title>

    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        display: grid;
        grid-template-columns: 640px 1fr;
        gap: 16px;
        margin: 0;
        padding: 16px;
      }
      #editor { width: 100%; height: 300px; }
      #run { padding: 8px 12px; cursor: pointer; }
      #log {
        background: #111;
        color: #0f0;
        padding: 8px;
        height: 120px;
        overflow: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 13px;
        border-radius: 4px;
      }
      canvas { display: block; }
      h2 { margin-top: 0; }
      
      .btn {
          padding: 8px 14px;
          background: #444;
          color: white;
          border: 1px solid #666;
          border-radius: 4px;
          cursor: pointer;
          font-size: 14px;
          margin-right: 6px;
          transition: background 0.15s ease, transform 0.1s ease;
        }

        .btn:hover {
          background: #555;
        }

        .btn:active {
          transform: scale(0.96);
        }

    </style>

     <!-- Phaser -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js" defer></script>

    <!-- Pyodide kann defer haben -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>

    <!-- Main Script   -->
      <script type="module" src="main.js"></script>

    <!-- Monaco Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.js"></script>
    <script>
      require.config({
        paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }
      });
    </script>

  </head>

  <body>

    <div>
      <div id="game"></div>
      <div id="log" aria-live="polite"></div>
    </div>

    <div>
      <h2>Python-Programm</h2>
      <div id="editor" style="width: 600px; height: 300px; border: 1px solid #555;"></div>
      <button id="run" class="btn" type="button">Ausführen</button>
      <button id="reset" class="btn" type="button">Reset</button>

    </div>

  </body>
</html>
