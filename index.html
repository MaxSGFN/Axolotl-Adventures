<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lerneinheit – Game</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0c10;
            color: #f1f5f9;
        }

        .glass {
            background: rgba(15,23,42,0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .bg-grid {
            background-image: radial-gradient(#2d0a0a 1px, transparent 1px);
            background-size: 40px 40px;
            background-attachment: fixed;
        }
    </style>
</head>

<body class="bg-grid">

    <!-- ✅ 1) OBERSTE TASKBAR -->
    <nav class="sticky top-0 w-full z-50 glass border-b border-slate-800">
        <div class="max-w-[95%] mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4 cursor-pointer">
                <div class="bg-gradient-to-br from-red-200 to-red-500 p-2 rounded-xl shadow-lg">
                    <i data-lucide="layout-template" class="w-5 h-5 text-red-950"></i>
                </div>
                <div>
                    <h2 class="font-black text-lg tracking-tighter text-white uppercase italic leading-none">
                        Fachinformatik
                    </h2>
                    <p class="text-[9px] text-red-400 font-bold tracking-[0.2em] uppercase mt-1">
                        Lernportal
                    </p>
                </div>
            </div>

            <button class="text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-white transition-all border border-slate-700 px-4 py-2 rounded-lg hover:bg-slate-800">
                Dashboard
            </button>
        </div>
    </nav>


    <!-- ✅ 2) HEADER MIT LERNEINHEIT -->
    <header class="mb-10 p-6 max-w-[95%] mx-auto">
        <div class="flex flex-col md:flex-row items-center gap-6">
            <div class="w-20 h-20 rounded-3xl bg-gradient-to-br from-red-200 to-red-500 text-red-950 flex items-center justify-center shadow-2xl shadow-red-500/20 flex-shrink-0">
                <i data-lucide="file-code-2" class="w-10 h-10"></i>
            </div>

            <div>
                <span class="text-[10px] font-black text-red-400 uppercase tracking-[0.2em]">
                    Lernfeld XX
                </span>

                <h1 class="text-3xl md:text-4xl font-black text-white uppercase tracking-tighter leading-tight mt-1">
                    Axolotl Adventures
                </h1>
            </div>
        </div>
    </header>


    <!-- GAME SECTION mit vollständigem Bild -->
    <main class="p-6 max-w-[95%] mx-auto">

        <div class="min-h-[40vh] glass 
                    flex flex-col items-center justify-center gap-0">
                    <img src="sprites/title_picture.png">

            <button onclick="window.location.href='level_select.html'"
            class="fixed left-1/2 -translate-x-1/2 bottom-6
                transition-all z-40">
                <img src="sprites/title_button.png" class="center">
            </button>
                


        </div>

    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
        });
    </script>

</body>
</html>
