<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lerneinheit – Game</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0c10;
            color: #f1f5f9;
        }

        .glass {
            background: rgba(15,23,42,0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .bg-grid {
            background-image: radial-gradient(#2d0a0a 1px, transparent 1px);
            background-size: 40px 40px;
            background-attachment: fixed;
        }
    </style>
</head>

<body class="bg-grid">

    <!-- ✅ 1) OBERSTE TASKBAR -->
    <nav class="sticky top-0 w-full z-50 glass border-b border-slate-800">
        <div class="max-w-[95%] mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4 cursor-pointer">
                <div class="bg-gradient-to-br from-red-200 to-red-500 p-2 rounded-xl shadow-lg">
                    <i data-lucide="layout-template" class="w-5 h-5 text-red-950"></i>
                </div>
                <div>
                    <h2 class="font-black text-lg tracking-tighter text-white uppercase italic leading-none">
                        Fachinformatik
                    </h2>
                    <p class="text-[9px] text-red-400 font-bold tracking-[0.2em] uppercase mt-1">
                        Lernportal
                    </p>
                </div>
            </div>

            <button class="text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-white transition-all border border-slate-700 px-4 py-2 rounded-lg hover:bg-slate-800">
                Dashboard
            </button>
        </div>
    </nav>


    <!-- ✅ 2) HEADER MIT LERNEINHEIT -->
    <header class="mb-10 p-6 max-w-[95%] mx-auto">
        <div class="flex flex-col md:flex-row items-center gap-6">
            <div class="w-20 h-20 rounded-3xl bg-gradient-to-br from-red-200 to-red-500 text-red-950 flex items-center justify-center shadow-2xl shadow-red-500/20 flex-shrink-0">
                <i data-lucide="file-code-2" class="w-10 h-10"></i>
            </div>

            <div>
                <span class="text-[10px] font-black text-red-400 uppercase tracking-[0.2em]">
                    Lernfeld XX
                </span>

                <h1 class="text-3xl md:text-4xl font-black text-white uppercase tracking-tighter leading-tight mt-1">
                    Axolotl Adventures
                </h1>
            </div>
        </div>
    </header>

    <!-- 🔥 LEVEL SELECT CONTAINER (1920px) -->
    <main class="max-w-[1920px] mx-auto p-6">

        <div class="glass rounded-2xl p-10 flex gap-10 imtems-start">

            <!-- ▶️ GRID MIT LEVEL BUTTONS -->
            <div id="level-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3
                           gap-6 flex-grow">
            </div>

            <!-- ▶️ HOVER INFO PANEL -->
            <div id="level-info" 
                 class="w-80 glass rounded-xl p-6 text-slate-300" style="position: absolute; top: 0; right: 0; transition: transform 0.2s ease-out;">
                <h2 class="text-xl font-bold text-red-300 mb-2" id="info-title"></h2>
                <p id="info-desc" class="text-sm leading-relaxed"></p>
            </div>

        </div>

    </main>

    <script>
        // 🔥 Manifest laden
        fetch("levels/manifest.json")
            .then(res => res.json())
            .then(data => loadLevels(data.levels));

        function loadLevels(levels) {
            const grid = document.getElementById("level-grid");

            // Standardtext beim Start
            document.getElementById("info-title").textContent = "Level auswählen";
            document.getElementById("info-desc").textContent = "Fahre mit der Maus über ein Level oder tippe darauf.";

            levels.forEach(level => {
                const btn = document.createElement("div");

                btn.className =
                    "w-[250px] h-[250px] rounded-xl overflow-hidden border border-red-300 " +
                    "cursor-pointer transition-transform hover:scale-105 shadow-lg";

                btn.innerHTML = `
                    <img src="${level.preview}">
                `;

                // Info-Panel aktualisieren (ohne ausblenden!)
                btn.addEventListener("mouseenter", () => {
                    document.getElementById("info-title").textContent = level.name;
                    document.getElementById("info-desc").textContent = level.description;
                });

                // Klick → Level starten
                btn.addEventListener("click", () => {
                    window.location.href = `game.html?level=${level.file}`;
                });

                grid.appendChild(btn);
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
        });

        
        document.addEventListener("scroll", () => {
            const info = document.getElementById("level-info");
            const offset = window.scrollY + 20; // Abstand zum oberen Rand
            info.style.transform = `translateY(${offset}px)`;
        });

    </script>

</body>
</html>
